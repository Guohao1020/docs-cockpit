# docs-cockpit · 完整配置参考(0.2.0)
#
# 用途:展示 dashboard 模式所有能力 · 含 system_docs 多入口 + modules + concepts + frontmatter 治理。
# 复制后改 project / paths / 各 group 的 dir 几行就能跑。

project:
  name: MyProject
  mark: M
  tagline: "项目模块进度 + 概念覆盖 + Sprint 追踪 · 一站式可视"
  eyebrow: "通用项目看板 · DASHBOARD"
  output: docs/index.html

paths:
  repo: "."
  # main_repo 在 worktree 内自动指回 main
  # 可加任意自定义变量 · 后续在 groups/system_docs 用 {name}
  memory_dir: "{home}/.claude/projects/my-project/memory"
  external_plans: "{home}/.claude/plans/my-project"

# ── 系统文档 · drawer 弹出 · 手挑常驻入口 ─────────────────────────
system_docs:
  - id: claude-md
    title: CLAUDE.md
    path: "{repo}/CLAUDE.md"
    desc: 项目根级 AI 协作约定 · 任务流程 / 命名规范 / 提交规范
    icon: memory

  - id: memory
    title: memory/
    path: "{memory_dir}/"
    desc: 持久化记忆与决策日志 · 跨会话上下文沉淀
    icon: memory

  - id: design-md
    title: DESIGN.md
    path: "{main_repo}/DESIGN.md"
    desc: 设计系统 tokens、组件规范、视觉语言
    icon: design

  - id: prd
    title: PRD.md
    path: "{repo}/docs/PRD.md"
    desc: 产品需求文档 · 功能矩阵、约束、优先级
    icon: doc

  - id: rfc-index
    title: RFC/
    path: "{repo}/docs/RFC/"
    desc: 技术决策记录 · 重大变更与权衡讨论
    icon: doc

  - id: roadmap
    title: Roadmap
    path: "{external_plans}/roadmap/"
    desc: 里程碑分解 · M0 → M3 GA 计划与排期
    icon: plan

# ── 模块 · 主 dashboard 数据源 ──────────────────────────────────
# 每模块 1 个 MD · frontmatter 带 id/title/status/sprint/progress/desc/docs/subtasks
modules:
  scan:
    dir: "{repo}/docs/spec/module"
    title_transform: prefix-dot-titlecase
    # 同时支持 glob / files · 见 references/config_reference.md

# ── 概念 · 底部 grid · 简化卡片 ─────────────────────────────────
concepts:
  scan:
    dir: "{repo}/docs/spec/concept"
    title_transform: prefix-dot-titlecase

# ── frontmatter 治理 ───────────────────────────────────────────
frontmatter:
  enabled: true
  status_progress_ranges:
    not-started: [0, 0]
    planned: [0, 15]
    in-progress: [5, 95]
    blocked: [0, 100]
    done: [100, 100]
    deferred: [0, 100]
