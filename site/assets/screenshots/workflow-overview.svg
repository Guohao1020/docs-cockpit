<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">docs-cockpit workflow overview</title>
  <desc id="desc">Install plugin, inject SessionStart router, use build or rebuild skills, render dashboard, and write index.html plus state.json.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#0f1d35"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13243d"/>
      <stop offset="1" stop-color="#0d1728"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1400" height="360" rx="24" fill="url(#bg)"/>
  <g fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.65">
    <path d="M0 80H1400M0 160H1400M0 240H1400M0 320H1400"/>
    <path d="M140 0V360M280 0V360M420 0V360M560 0V360M700 0V360M840 0V360M980 0V360M1120 0V360M1260 0V360"/>
  </g>
  <text x="56" y="62" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">docs-cockpit workflow</text>
  <text x="56" y="94" fill="#93a4bd" font-family="Arial, sans-serif" font-size="16">Skills carry the judgment. Python renders deterministic markdown into local dashboard artifacts.</text>

  <g transform="translate(70 145)">
    <rect width="190" height="112" rx="18" fill="url(#card)" stroke="#255182"/>
    <circle cx="36" cy="38" r="13" fill="#2563eb"/>
    <text x="62" y="43" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">Install plugin</text>
    <text x="24" y="76" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="14">Codex / Claude Code</text>
  </g>
  <path d="M280 201H360" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(380 145)">
    <rect width="190" height="112" rx="18" fill="url(#card)" stroke="#255182"/>
    <circle cx="36" cy="38" r="13" fill="#38bdf8"/>
    <text x="62" y="43" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">SessionStart</text>
    <text x="24" y="76" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="14">router skill injected</text>
  </g>
  <path d="M590 201H670" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(690 125)">
    <rect width="220" height="152" rx="18" fill="url(#card)" stroke="#255182"/>
    <circle cx="36" cy="38" r="13" fill="#22c55e"/>
    <text x="62" y="43" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">Build / Rebuild</text>
    <text x="24" y="78" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="14">discover docs</text>
    <text x="24" y="102" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="14">verify anchors</text>
    <text x="24" y="126" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="14">decide with evidence</text>
  </g>
  <path d="M930 201H1010" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(1030 145)">
    <rect width="190" height="112" rx="18" fill="url(#card)" stroke="#255182"/>
    <circle cx="36" cy="38" r="13" fill="#f59e0b"/>
    <text x="62" y="43" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">Render</text>
    <text x="24" y="76" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="14">docs-cockpit render</text>
  </g>
  <path d="M1240 201H1295" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(1110 280)">
    <rect width="220" height="46" rx="12" fill="#10233d" stroke="#255182"/>
    <text x="20" y="29" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="15">docs/index.html + state.json</text>
  </g>
  <path d="M1125 258C1148 282 1184 292 1220 292" stroke="#38bdf8" stroke-width="2" fill="none"/>
</svg>
